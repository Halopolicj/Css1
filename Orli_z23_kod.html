<p id="pogrubienie_orlinski">Orliński<br>
    Dlaczego programista myli Halloween z Bożym Narodzeniem?<br>
    Bo 31 OCT = 25 DEC.</p>
<p id="pochylona_orlinski">
    Programista na diecie:<br>
    „Dziś jem tylko 1 i 0… czyli coś zjem albo nie.”
</p>
<p id="index_gorny_orlinski">
    Ilu programistów potrzeba, żeby wymienić żarówkę?<br>
    Żadnego, to problem sprzętowy.
</p>
<p id="index_dolny_orlinski">
    Żona do programisty: „Idź do sklepu po chleb. Jak będą jajka, kup 10.”<br>
    Programista wraca z 10 chlebami.
</p>
<p id="mono_orlinski">
    Dlaczego programiści nie lubią natury?<br>
    Bo ma za dużo bugów.
</p>
<p id="powiekszenie_orlinski">
    Jak programista bierze prysznic?<br>
    Najpierw czyta dokumentację szamponu.
</p>
<p id="pomniejszenie_orlinski">
    Dlaczego Java i JavaScript to nie to samo?<br>
    Bo ham i hamster też nie są tym samym.
</p>
