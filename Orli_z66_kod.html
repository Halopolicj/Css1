<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Orliński Z66_HTML</title>
    <link href="text.css" rel="stylesheet" type="text/CSS">
</head>
<body>
    <ul>
        <li>pseudoelementem:first-line</li>
        Obejmuje formatowaniem całą
        pierwszą linię.<br>
        &lt;textarea&gt;
p
    {
    color:navy;
    font-size:12pt;
    }
p:first-line
    {
    color:red;
    font-size:20pt;
    font-weight:bold;
    }
        &lt;/textarea&gt;
        <li>pseudoelementy: :after oraz :before</li>
        Oba elementy służą do umieszczania tekstu przed i za
        formatowanym elementem strony.
        <br>
        &lt;textarea&gt;
p:before
    {
    content:"TO SĄ ĆWICZENIA";
    font-size:15pt;
    font-style:italic;
    font-weight:bold;
    }
p:after
    {
    content:"AUTOR Król Lew";
    font-size:15pt;
    font-style:italic;
    font-weight:bold;
    }
        &lt;/textarea&gt;
        <li>pseudoelement:first-letter</li>
        Pozwala na formatowanie pierwszej litery w bloku tekstu.<br>
        &lt;textarea&gt
p
    {
    color:navy;
    font-size:30pt;
    }
p:first-letter
    {
    color:red;
    font-size:100pt;
    }
        &lt;/textarea&gt;
    </ul>
</body>
</html>
<!-- Orliński z66_html-->
